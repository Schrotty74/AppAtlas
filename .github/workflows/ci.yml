name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    name: Build and Test
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Swift environment
        run: |
          xcodebuild -version
          swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test

      - name: Privacy check
        run: Scripts/privacy-check.sh
